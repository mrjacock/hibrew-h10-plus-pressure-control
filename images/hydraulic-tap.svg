<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Hydraulic pressure tap</title>
  <desc id="desc">Conceptual hydraulic diagram showing the pressure sensor added near the original gauge line.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1100" height="520" rx="22" fill="#f8fafc"/>
  <text x="50" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#111827">Pressure sensor hydraulic tap</text>
  <text x="50" y="96" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" fill="#4b5563">Recommended conceptual tap point: the line between the original gauge and the brew group.</text>

  <rect x="80" y="215" width="170" height="90" rx="18" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="124" y="268" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">Pump</text>

  <rect x="390" y="205" width="170" height="110" rx="18" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="425" y="252" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">Brew</text>
  <text x="425" y="281" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">group</text>

  <rect x="740" y="205" width="170" height="110" rx="18" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="780" y="252" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">Original</text>
  <text x="790" y="281" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">gauge</text>

  <circle cx="650" cy="260" r="28" fill="#ccfbf1" stroke="#0f766e" stroke-width="4"/>
  <text x="641" y="268" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#0f766e">T</text>

  <rect x="570" y="380" width="220" height="90" rx="18" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="605" y="420" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">Pressure sensor</text>
  <text x="625" y="449" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#4b5563">0-12 bar feedback</text>

  <path d="M250 260 H380" stroke="#0f766e" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <path d="M560 260 H622" stroke="#0f766e" stroke-width="8" fill="none"/>
  <path d="M678 260 H730" stroke="#0f766e" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <path d="M650 288 V370" stroke="#0f766e" stroke-width="8" fill="none" marker-end="url(#arrow)"/>

  <rect x="65" y="120" width="970" height="52" rx="12" fill="#ecfeff" stroke="#0891b2"/>
  <text x="90" y="153" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#155e75">Use mechanically compatible fittings, correct O-rings, and leak-test before closing the machine.</text>
</svg>
