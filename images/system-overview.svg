<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">System overview</title>
  <desc id="desc">Block diagram of the original machine controller, Arduino Nano, pressure sensor, power board, and pump.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="1098" height="618" rx="22" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="48" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#111827">System overview</text>
  <text x="48" y="96" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" fill="#4b5563">The Arduino sits between the original MOTO signal and the pump power stage.</text>

  <rect x="65" y="180" width="250" height="120" rx="16" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="91" y="225" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">Original controller</text>
  <text x="91" y="258" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#4b5563">Generates the MOTO signal</text>
  <text x="91" y="284" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#4b5563">and keeps factory UI logic</text>

  <rect x="425" y="165" width="260" height="150" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="467" y="215" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="700" fill="#111827">Arduino Nano</text>
  <text x="457" y="250" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#1f2937">D2: MOTO input</text>
  <text x="457" y="276" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#1f2937">D5: MOTO output</text>
  <text x="457" y="302" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#1f2937">A4: pressure feedback</text>

  <rect x="805" y="180" width="230" height="120" rx="16" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="845" y="225" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">Power board</text>
  <text x="850" y="258" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#4b5563">TRIAC stage</text>
  <text x="850" y="284" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#4b5563">drives ULKA pump</text>

  <rect x="170" y="420" width="250" height="100" rx="16" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="213" y="462" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">Pressure sensor</text>
  <text x="225" y="494" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#4b5563">0-12 bar, 0.5-4.5 V</text>

  <rect x="735" y="410" width="230" height="120" rx="16" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="788" y="455" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="700" fill="#111827">Hydraulic line</text>
  <text x="770" y="488" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#4b5563">Gauge / group pressure tap</text>

  <path d="M315 240 H415" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="335" y="225" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#1d4ed8">MOTO</text>

  <path d="M685 240 H795" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="713" y="225" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#1d4ed8">modulated MOTO</text>

  <path d="M420 470 C520 470, 530 335, 555 315" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="447" y="449" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#1d4ed8">A4 pressure</text>

  <path d="M805 300 C805 350, 805 375, 825 410" fill="none" stroke="#6b7280" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="835" y="356" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#4b5563">pump output creates pressure</text>
</svg>
