<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">MOTO pulse modulation</title>
  <desc id="desc">Timing diagram showing original MOTO pulses and skipped pulses after pressure control.</desc>
  <rect width="1180" height="620" rx="22" fill="#f9fafb"/>
  <text x="50" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#111827">MOTO pulse modulation</text>
  <text x="50" y="96" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" fill="#4b5563">The original controller still creates MOTO. The Arduino decides which pulses reach the pump stage.</text>

  <line x1="120" y1="185" x2="1080" y2="185" stroke="#d1d5db" stroke-width="2"/>
  <text x="60" y="190" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#111827">ZERO</text>
  <g stroke="#9ca3af" stroke-width="2">
    <line x1="140" y1="155" x2="140" y2="460"/>
    <line x1="240" y1="155" x2="240" y2="460"/>
    <line x1="340" y1="155" x2="340" y2="460"/>
    <line x1="440" y1="155" x2="440" y2="460"/>
    <line x1="540" y1="155" x2="540" y2="460"/>
    <line x1="640" y1="155" x2="640" y2="460"/>
    <line x1="740" y1="155" x2="740" y2="460"/>
    <line x1="840" y1="155" x2="840" y2="460"/>
    <line x1="940" y1="155" x2="940" y2="460"/>
    <line x1="1040" y1="155" x2="1040" y2="460"/>
  </g>

  <text x="60" y="285" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#111827">D2</text>
  <text x="60" y="405" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#111827">D5</text>
  <text x="115" y="130" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#4b5563">zero-cross references</text>

  <g fill="#2563eb">
    <rect x="150" y="245" width="42" height="55" rx="6"/>
    <rect x="250" y="245" width="42" height="55" rx="6"/>
    <rect x="350" y="245" width="42" height="55" rx="6"/>
    <rect x="450" y="245" width="42" height="55" rx="6"/>
    <rect x="550" y="245" width="42" height="55" rx="6"/>
    <rect x="650" y="245" width="42" height="55" rx="6"/>
    <rect x="750" y="245" width="42" height="55" rx="6"/>
    <rect x="850" y="245" width="42" height="55" rx="6"/>
    <rect x="950" y="245" width="42" height="55" rx="6"/>
    <rect x="1050" y="245" width="42" height="55" rx="6"/>
  </g>
  <g fill="#16a34a">
    <rect x="150" y="365" width="42" height="55" rx="6"/>
    <rect x="250" y="365" width="42" height="55" rx="6"/>
    <rect x="450" y="365" width="42" height="55" rx="6"/>
    <rect x="550" y="365" width="42" height="55" rx="6"/>
    <rect x="750" y="365" width="42" height="55" rx="6"/>
    <rect x="950" y="365" width="42" height="55" rx="6"/>
  </g>
  <g stroke="#dc2626" stroke-width="5" stroke-linecap="round">
    <line x1="352" y1="365" x2="392" y2="420"/>
    <line x1="392" y1="365" x2="352" y2="420"/>
    <line x1="652" y1="365" x2="692" y2="420"/>
    <line x1="692" y1="365" x2="652" y2="420"/>
    <line x1="852" y1="365" x2="892" y2="420"/>
    <line x1="892" y1="365" x2="852" y2="420"/>
    <line x1="1052" y1="365" x2="1092" y2="420"/>
    <line x1="1092" y1="365" x2="1052" y2="420"/>
  </g>
  <rect x="95" y="500" width="990" height="64" rx="14" fill="#eef2ff" stroke="#6366f1"/>
  <text x="120" y="538" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#3730a3">Each original pulse is about 1.6 ms on the tested unit. The TRIAC only needs a short trigger pulse.</text>
</svg>
